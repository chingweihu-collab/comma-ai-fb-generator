<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逗點教室 | AI 品牌文案自動化產線 (V7.0 尊榮視覺版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        :root { 
            --comma-hq: #2d3b48; 
            --comma-yellow: #ffd600; 
            --comma-light: #f4f6f8;
        }
        body { 
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; 
            background-color: #eaeff2; /* 更高級的冷灰底色 */
            background-image: radial-gradient(#d5dde4 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .bg-comma { background-color: var(--comma-hq); }
        .text-comma { color: var(--comma-hq); }
        
        /* 高級切換開關 */
        .toggle-checkbox:checked { right: 0; border-color: #10a978; }
        .toggle-checkbox:checked + .toggle-label { background-color: #10a978; }
        
        /* 載入動畫 */
        .loader { border-top-color: var(--comma-yellow); -webkit-animation: spinner 1s ease-in-out infinite; animation: spinner 1s ease-in-out infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* 高級輸入框 focus 特效 */
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(255, 214, 0, 0.4); border-color: var(--comma-yellow); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-gradient-to-r from-[#2d3b48] to-[#1a232b] text-white shadow-lg sticky top-0 z-50 border-b-4 border-[#ffd600]">
        <div class="container mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-white p-1 rounded-lg shadow-sm">
                    <img src="./逗點教室LOGO.png" alt="COMMA Logo" class="h-10 w-auto object-contain" onerror="this.outerHTML='<span class=\'text-2xl px-2 text-black font-black\'>COMMA</span>'">
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-wider text-white drop-shadow-sm">品牌文案自動化產線</h1>
                    <p class="text-xs text-[#ffd600] font-bold tracking-widest">V7.0 PRO EDITION</p>
                </div>
            </div>
            <div class="flex items-center gap-3 bg-white/10 p-2 rounded-xl backdrop-blur-sm border border-white/20 w-full md:w-auto">
                <span class="text-xs font-bold text-gray-200 whitespace-nowrap">API Key</span>
                <input type="password" id="apiKey" placeholder="請輸入 Groq Key" class="text-sm p-1.5 px-3 rounded-lg text-black w-full md:w-48 outline-none focus:ring-2 focus:ring-[#ffd600]">
                <button onclick="saveApiKey()" class="text-xs bg-[#ffd600] hover:bg-yellow-400 px-4 py-2 rounded-lg text-[#2d3b48] font-black transition-all shadow-sm active:scale-95">儲存</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-grow grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 space-y-6">
            
            <div class="bg-white p-5 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 flex justify-between items-center transition-all hover:shadow-md">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-xl">⚙️</div>
                    <div>
                        <h3 class="font-bold text-[#2d3b48] text-sm">系統運作模式</h3>
                        <p class="text-xs text-gray-500 font-medium" id="modeDesc">目前：產出 Prompt 供手動複製</p>
                    </div>
                </div>
                <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" name="toggle" id="modeToggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer transition-transform duration-200 ease-in-out z-10 shadow-sm"/>
                    <label for="modeToggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer shadow-inner"></label>
                </div>
            </div>

            <div class="bg-white p-7 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.06)] border border-gray-100 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-2 h-full bg-[#ffd600]"></div>
                <h3 class="font-black text-[#2d3b48] text-lg mb-6 flex items-center gap-2">
                    <svg class="w-5 h-5 text-[#ffd600]" fill="currentColor" viewBox="0 0 20 20"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z"></path></svg>
                    策略文案需求設定
                </h3>
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-[#2d3b48] mb-1.5">📍 0. 選擇發文分校</label>
                        <select id="branchSelect" onchange="updateDynamicInspirations()" class="w-full p-3 bg-slate-50 border border-slate-200 text-[#2d3b48] rounded-xl outline-none font-bold text-sm input-focus cursor-pointer transition-all">
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-[#2d3b48] mb-1.5">🎯 1. 文案類型</label>
                        <select id="docType" onchange="updateDynamicInspirations()" class="w-full p-3 bg-slate-50 border border-slate-200 text-[#2d3b48] rounded-xl outline-none font-bold text-sm input-focus cursor-pointer transition-all">
                            <option value="常態課程">📚 常態/核心課程推廣</option>
                            <option value="招生檔期">🔥 重點招生/營隊檔期</option>
                            <option value="節慶">🎉 節慶與時事預熱</option>
                        </select>
                    </div>

                    <div class="bg-[#f8fafc] p-4 rounded-2xl border border-slate-200 shadow-inner">
                        <div class="text-xs font-bold text-slate-500 mb-3 flex items-center gap-1.5">
                            <span class="text-yellow-500 text-base">✨</span> 靈感角落 (點擊自動帶入主題)
                        </div>
                        <div id="inspirationBox" class="flex flex-wrap gap-2.5">
                            </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-[#2d3b48] mb-1.5">📝 2. 文案主題</label>
                        <input type="text" id="topic" placeholder="請點擊上方靈感，或手動輸入" class="w-full p-3 bg-white border border-slate-300 rounded-xl outline-none font-black text-[#2d3b48] input-focus transition-all shadow-sm">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-red-500 mb-1.5 flex items-center gap-1">
                            🚨 3. 關鍵訊息 & 在地細節 <span class="text-xs font-medium text-gray-400">(強烈建議填寫)</span>
                        </label>
                        <textarea id="notes" rows="4" placeholder="【魔法藏在細節裡】請輸入分校真實發生的事！
(AI 會幫您把這些短句『擴寫並潤飾』成生動的故事)

範例：今天旭日校發披薩慶祝段考結束，幾個國二生笑得很開心，強調我們陪孩子一起讀書一起玩。" class="w-full p-3 bg-red-50/50 border border-red-100 rounded-xl outline-none text-sm leading-relaxed placeholder-gray-400 input-focus transition-all shadow-sm"></textarea>
                    </div>
                </div>

                <button id="generateBtn" onclick="processGeneration()" class="w-full mt-8 bg-gradient-to-r from-[#2d3b48] to-[#1a232b] text-white font-black text-lg py-4 rounded-2xl shadow-lg hover:shadow-xl hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 flex justify-center items-center gap-2">
                    🚀 產出 FB 專屬 Prompt
                </button>
            </div>
        </div>

        <div class="lg:col-span-7 flex flex-col h-[calc(100vh-8rem)] min-h-[600px]">
            <div class="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.06)] border border-gray-100 flex-grow flex flex-col overflow-hidden relative">
                <div class="bg-[#f8fafc] border-b border-gray-100 py-4 px-6 flex justify-between items-center">
                    <span class="font-black text-[#2d3b48] flex items-center gap-2">
                        <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Facebook 專屬產出結果
                    </span>
                    <span class="text-xs bg-slate-200 text-slate-600 px-3 py-1 rounded-full font-bold">150-200字限定</span>
                </div>
                <div class="p-6 flex-grow bg-white relative">
                    <div id="loadingUI" class="hidden absolute inset-0 bg-white/90 backdrop-blur-sm flex flex-col justify-center items-center z-10">
                        <div class="loader border-4 border-slate-200 rounded-full w-14 h-14 mb-4"></div>
                        <p class="text-[#2d3b48] font-black tracking-widest animate-pulse">逗點品牌大腦高速運算中...</p>
                    </div>
                    <textarea id="outputArea" readonly class="w-full h-full p-2 bg-transparent border-none text-[#2d3b48] text-[15px] leading-loose resize-none focus:outline-none placeholder-gray-300 font-medium" placeholder="您的完美文案將會顯示在這裡..."></textarea>
                </div>
                <div class="p-5 bg-[#f8fafc] border-t border-gray-100 flex justify-between items-center">
                    <span id="hiddenDataMsg" class="text-xs text-[#10a978] font-bold bg-green-50 px-3 py-1 rounded-full border border-green-100 hidden flex items-center gap-1">
                        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                        已自動注入專屬課程價值
                    </span>
                    <button onclick="copyCurrentOutput()" class="bg-[#2d3b48] text-white px-8 py-2.5 rounded-xl text-sm font-black hover:bg-[#1a232b] hover:shadow-lg active:scale-95 transition-all ml-auto flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        一鍵複製內容
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const BRANCH_DATA = {

            "竹北知行校": { level: "ele", ig: "https://www.instagram.com/commaclass_insight/", phone: "03-667-5429", address: "新竹縣竹北市十興路一段399號" },
            "大園參天校": { level: "jun", ig: "https://instagram.com/commaclass_towering", phone: "03-384-0788", address: "桃園市大園區中山南路265號" },
            "園中方舟校": { level: "jun", ig: "https://www.instagram.com/commaclass_ark/", phone: "03-384-0850", address: "桃園市大園區大觀路995號" },
            "青埔旭日校": { level: "jun", ig: "https://instagram.com/commaclass_sun", phone: "03-422-9989", address: "桃園市中壢區領航北路二段339號4樓" },
            "中壢心夢想校": { level: "jun", ig: "https://www.instagram.com/commaclassdreamhigh/", phone: "03-427-3468", address: "桃園市中壢區中豐路49巷18弄25號" },
            "青埔升大校": { level: "sen", ig: "https://www.instagram.com/commaclass_senior/", phone: "03-287-6849", address: "桃園市中壢區永信路261號" }
        };

        const LEVEL_NAMES = { "ele": "國小部", "jun": "國中部", "sen": "高中部" };

        // 🚀 解除月份限制：列出全年完整的節慶
        const ALL_FESTIVALS = ["春節", "兒童節", "母親節", "端午節", "父親節", "中秋節", "雙十節", "萬聖節", "感恩節", "聖誕節", "跨年預熱"];

        // 🚀 解除月份限制：依部別列出全年重點招生大檔
        const ALL_RECRUITS = {
            "ele": ["寒假營隊招生", "國小暑期營隊招生", "資優私中招生", "小一先修招生", "段考準備"],
            "jun": ["國一先修內招生", "國一先修外招生", "會考後銜接", "國二暑期營隊", "暑期輔導", "寒假營隊招生", "段考準備", "會考模考班宣傳"],
            "sen": ["高一贏領營招生", "高二暑期營隊", "暑期輔導", "寒假營隊招生", "段考準備", "學測衝刺班"]
        };

        const NORMAL_COURSES = {
            "ele": ["國小創新全人素養班", "國小精修資優數學", "奧數選手班", "芝蔴街美語", "TEAMMS跨領域英語", "黑洞科學", "逗點閱思素養課程", "溫美玉科技作文", "資優鑑定私中培訓班", "覓彌爾機器人", "自然資優培訓班", "小一STREAM營隊", "五學超人探索營", "七感饗宴", "寶島台灣逗陣行", "環遊世界ＦＵＮ暑假", "生活實習家", "菁英學院養成營", "超腦開發實驗室", "未來領袖學院", "未來玩家-不可能的任務", "超新星領航計畫"],
            "jun": ["國中數學精修班/資優班", "國中自然精修班/資優班", "國中英文精修班/資優班", "國中國文精修班", "國中社會精修班", "國一超修資優數學（復旦專班）", "國一先修暑期素養班", "國一超修學霸養成班", "國一全人素養營", "國二創世紀職涯挑戰營", "國三戰逗暑訓營", "國三黑馬衝刺營", "國三會考模考班", "武陵科學數理資優拔尖班"],
            "sen": ["高中數學精修班", "高中自然精修班", "高中英文精修班", "高中國文精修班", "學測衝刺班", "分科攻頂班", "高一贏領營", "高一職涯探索營", "高二夢想實踐營", "高三學測衝刺班", "高三分科攻頂班"]
        };

        const COURSE_DB = {
            "創新全人素養班": { features: "以品學為本，五學並進。結合桌遊『我是CEO』，採用沉浸式教學。", pain: "領域發展不均，課業負擔重，大數字計算焦慮。", results: "學會尊重生命，成就全人發展。" },
            "黑洞科學": { features: "每階段12單元不重複，一人一份實驗器材，理論轉化手作。", pain: "坊間缺乏實體物，傳統多背誦缺乏思辨。", results: "開啟科學好奇心，引導探究與思考。" },
            "科技作文": { features: "觸控螢幕輔助，搭配範文與具體評分，漸進式強化寫作。", pain: "詞彙不足不知下筆，結構鬆散，對寫作抗拒。", results: "從害怕變成愛上寫作，文字理解力大增。" },
            "私中": { features: "專為私中設計教材，精緻小班，強調理解非盲目刷題。", pain: "大班制缺乏關注，過度刷題導致疲乏。", results: "穩定學習節奏並兼顧全人心態。" },
            "國一先修": { features: "超前完成國一首次段考進度，傳授筆記心法，舉辦態度翻轉營。", pain: "擔心無法適應國中課業與生活壓力。", results: "建立自信，成功建立家長信任感。" },
            "會考": { features: "大量模擬實戰，傳授時間分配，要求錯題本，祈福安定軍心。", pain: "面對大考範圍廣泛感到焦慮，不知如何統整。", results: "順利考取理想志願。" },
            "學測": { features: "依108課綱規劃複習，定期測驗搭配錯題分析補強。", pain: "高中課業繁重，缺乏系統化策略與時間管理。", results: "模擬考成績逐步上升，錄取第一志願。" }
        };

        let isApiMode = false;

        window.onload = function() {
            const savedKey = localStorage.getItem('comma_groq_key');
            if(savedKey) document.getElementById('apiKey').value = savedKey;
            
            const branchSelect = document.getElementById('branchSelect');
            for (let key in BRANCH_DATA) {
                let option = document.createElement("option");
                option.value = key; option.text = key;
                branchSelect.appendChild(option);
            }

            document.getElementById('modeToggle').addEventListener('change', function(e) {
                isApiMode = e.target.checked;
                document.getElementById('modeDesc').innerText = isApiMode ? "目前：API 模式" : "目前：Prompt 模式";
                document.getElementById('generateBtn').innerHTML = isApiMode 
                    ? "✨ 呼叫 Llama3.3 產出 FB 貼文" 
                    : "🚀 產出 FB 專屬 Prompt";
                
                // 更換為綠色科技感按鈕
                if(isApiMode) {
                    document.getElementById('generateBtn').classList.remove('from-[#2d3b48]', 'to-[#1a232b]');
                    document.getElementById('generateBtn').classList.add('from-[#10a978]', 'to-[#058b5e]');
                } else {
                    document.getElementById('generateBtn').classList.add('from-[#2d3b48]', 'to-[#1a232b]');
                    document.getElementById('generateBtn').classList.remove('from-[#10a978]', 'to-[#058b5e]');
                }
            });

            updateDynamicInspirations();
        }

        function saveApiKey() {
            const key = document.getElementById('apiKey').value.trim();
            if(key) { localStorage.setItem('comma_groq_key', key); alert('API 金鑰已安全儲存！'); }
        }

        function updateDynamicInspirations() {
            const branch = document.getElementById('branchSelect').value;
            const level = BRANCH_DATA[branch] ? BRANCH_DATA[branch].level : "ele"; 
            const docType = document.getElementById('docType').value;
            const container = document.getElementById('inspirationBox');
            
            container.innerHTML = '';
            let rawRecs = [];

            // 🚀 套用無月份限制的全覽邏輯
            if (docType === "節慶") {
                rawRecs = ALL_FESTIVALS;
            } else if (docType === "招生檔期") {
                rawRecs = ALL_RECRUITS[level] || [];
            } else if (docType === "常態課程") {
                rawRecs = NORMAL_COURSES[level] || [];
            }

            let validRecs = [];
            if (Array.isArray(rawRecs)) {
                for (let i = 0; i < rawRecs.length; i++) {
                    let item = rawRecs[i];
                    if (item && typeof item === 'string') {
                        let cleanItem = item.trim();
                        if (cleanItem !== "" && cleanItem.toLowerCase() !== "undefined") {
                            validRecs.push(cleanItem);
                        }
                    }
                }
            }

            if (validRecs.length === 0) {
                validRecs = ["本區塊暫無資料"];
            }
            
            validRecs.forEach(item => {
                const btn = document.createElement('button');
                // 🚀 升級為膠囊 (Pill) 風格的視覺按鈕
                btn.className = "bg-white border border-slate-200 text-slate-600 text-[13px] px-4 py-1.5 rounded-full shadow-sm hover:bg-[#ffd600] hover:border-[#ffd600] hover:text-[#2d3b48] hover:shadow-md transition-all duration-200 font-bold tracking-wide";
                btn.innerText = item;
                btn.onclick = () => {
                    if(item === "本區塊暫無資料") return; 
                    document.getElementById('topic').value = item;
                    document.getElementById('notes').value = ""; 
                    checkHiddenCourseData(item);
                    
                    // 點擊特效：稍微彈跳一下
                    btn.classList.add('scale-95');
                    setTimeout(() => btn.classList.remove('scale-95'), 150);
                };
                container.appendChild(btn);
            });
        }

        function checkHiddenCourseData(topicInput) {
            const msg = document.getElementById('hiddenDataMsg');
            let found = false;
            for(let key in COURSE_DB) {
                if(topicInput.includes(key)) found = true;
            }
            if(found) {
                msg.classList.remove('hidden');
            } else {
                msg.classList.add('hidden');
            }
        }

        function copyCurrentOutput() {
            navigator.clipboard.writeText(document.getElementById('outputArea').value).then(() => {
                alert('✨ 文案已成功複製，快去發布吧！');
            });
        }

        function fixTitleFormat(text) {
            let lines = text.split('\n');
            let firstLineIdx = 0;
            while(firstLineIdx < lines.length && lines[firstLineIdx].trim() === '') {
                firstLineIdx++;
            }
            if (firstLineIdx < lines.length) {
                let firstLine = lines[firstLineIdx].trim();
                firstLine = firstLine.replace(/^標題[：:]\s*/, '');
                firstLine = firstLine.replace(/^\*\*標題[：:]\*\*\s*/, '');
                firstLine = firstLine.replace(/^【標題】\s*/, '');
                
                if (!firstLine.includes('◤') && !firstLine.includes('◢')) {
                    lines[firstLineIdx] = `◤ ${firstLine} ◢`;
                } else if (!firstLine.includes('◤')) {
                    lines[firstLineIdx] = `◤ ${firstLine}`;
                } else if (!firstLine.includes('◢')) {
                    lines[firstLineIdx] = `${firstLine} ◢`;
                } else {
                    lines[firstLineIdx] = firstLine;
                }
                return lines.join('\n');
            }
            return text;
        }

        async function processGeneration() {
            const branch = document.getElementById('branchSelect').value;
            const branchInfo = BRANCH_DATA[branch];
            const type = document.getElementById('docType').value;
            const topic = document.getElementById('topic').value.trim();
            const notes = document.getElementById('notes').value.trim();

            if(!topic) {
                alert("⚠️ 請先選擇或輸入「文案主題」喔！");
                document.getElementById('topic').focus();
                return;
            }

            let hiddenCoursePrompt = "";
            for(let key in COURSE_DB) {
                if(topic.includes(key) || notes.includes(key)) {
                    hiddenCoursePrompt += `\n【隱藏版系統指示：${key} 專屬課程價值】\n`;
                    hiddenCoursePrompt += `- 課程特色：${COURSE_DB[key].features}\n`;
                    hiddenCoursePrompt += `- 家長痛點：${COURSE_DB[key].pain}\n`;
                    hiddenCoursePrompt += `- 關鍵成果：${COURSE_DB[key].results}\n`;
                }
            }

            const finalPrompt = `角色設定：
你是「COMMA 逗點教室」的資深社群總監。請完全吸收以下的品牌大腦，撰寫可以直接發布的 Facebook 貼文。

【逗點品牌大腦與核心靈魂】
1. 品牌定位：不是成績加工廠，而是「教育基地」。使命是「接住每一個孩子」。
2. 核心價值：陪伴大於成績、全人發展與境教、善的循環。
3. 受眾：35-50歲重視質感的現代家長。

【寫作風格與禁忌】
- 語氣：溫暖真誠、熱血正向。
- 禁用：恐嚇行銷(落後別人)、冰冷詞彙(保證班、滿分狀元)、上對下說教。
- 稱呼：請用「逗點」、「教育基地」或「大人朋友」。稱呼家長為「逗爸逗媽」。
- 排版：段落必定留白。適度使用溫暖 Emoji (💛, ✨, 🫶🏻, 🤜🏻🤛🏻, 🔥)。

【FB 專屬爆款貼文骨架 (正文精準控制在 150-200 字之間)】
1. 破題金句 (Hook)：文章的「第一行」必須是一句戳中痛點的吸睛標題。且這行標題的最前面與最後面，必須直接使用 ◤ 與 ◢ 包住。絕對不能寫出「標題：」這兩個字。
2. 痛點同理與解法：自然帶入「陪伴」或「境教」理念。
3. 溫暖呼籲 (CTA)：自然引導行動，附 3-5 個 Hashtag。

【本次任務需求】
發布分校：${LEVEL_NAMES[branchInfo.level]} (${branch})
文案類型：${type}
文案主題：${topic}

【在地真實細節素材】
${notes ? notes : "無提供細節，請依據品牌精神自由發揮"}
${hiddenCoursePrompt}

🚨 核心寫作指令（極度重要）：
上方提供的「在地真實細節素材」只是給你參考的短句。
請你務必將這些短句作為靈感，發揮創意進行「重新擴寫與潤飾」，把它變成一段生動、有畫面的真實情境故事！絕對禁止原封不動地照抄素材句子！

【輸出格式最終限制】
1. 直接輸出純文字貼文，不加開場廢話，禁用 JSON 或 Markdown 區塊。
2. 結尾請直接接上以下的「固定結尾資訊」（不要加外框或括號）：

⸻⸻⸻⸻⸻⸻
「逗點，是一個創新的起點。」
 逗點官網｜https://www.comma.study
 ${branch} IG｜${branchInfo.ig}
 ${branch} 專線｜${branchInfo.phone}
 ${branch} 地址｜${branchInfo.address}
`;

            if (!isApiMode) {
                document.getElementById('outputArea').value = `【請複製以下內容貼給 ChatGPT】\n\n------------------------\n\n${finalPrompt}`;
            } else {
                const apiKey = document.getElementById('apiKey').value.trim();
                if(!apiKey) return alert('請先輸入 API Key！');
                document.getElementById('loadingUI').classList.remove('hidden');
                document.getElementById('outputArea').value = ""; // 清空舊畫面
                
                try {
                    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                        body: JSON.stringify({
                            model: 'llama-3.3-70b-versatile',
                            messages: [{ role: 'user', content: finalPrompt }],
                            temperature: 0.8
                        })
                    });
                    const data = await res.json();
                    let aiResult = data.choices[0].message.content.trim();
                    aiResult = fixTitleFormat(aiResult);
                    document.getElementById('outputArea').value = aiResult;
                } catch (err) {
                    alert('發生錯誤：' + err.message);
                } finally {
                    document.getElementById('loadingUI').classList.add('hidden');
                }
            }
        }
    </script>
</body>
</html>
