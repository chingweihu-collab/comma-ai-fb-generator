            --theme-color: #ffd600;

            background-image: radial-gradient(#d5dde4 1px, transparent 1px);
            background-size: 20px 20px;

        .border-theme { border-color: var(--theme-color) !important; }
        .bg-theme { background-color: var(--theme-color) !important; color: var(--theme-text) !important; }
        .text-theme { color: var(--theme-color) !important; }

                btn.innerHTML = isApiMode ? "✨ 呼叫 Llama3.3 產出 FB 貼文" : "🚀 產出 FB 專屬 Prompt";
                
                if(isApiMode) {
                    btn.classList.remove('from-[#2d3b48]', 'to-[#1a232b]');
                    btn.classList.add('from-[#10a978]', 'to-[#058b5e]');
                } else {
                    btn.classList.add('from-[#2d3b48]', 'to-[#1a232b]');
                    btn.classList.remove('from-[#10a978]', 'to-[#058b5e]');
                }
            });

            updateDynamicInspirations();
        }

        function saveApiKey() {
            const key = document.getElementById('apiKey').value.trim();
            if(key) { localStorage.setItem('comma_groq_key', key); alert('API 金鑰已安全儲存！'); }
        }

        function updateDynamicInspirations() {
            const branch = document.getElementById('branchSelect').value;
            const level = BRANCH_DATA[branch] ? BRANCH_DATA[branch].level : "ele"; 
            const docType = document.getElementById('docType').value;
            const container = document.getElementById('inspirationBox');
            
            const theme = THEME_COLORS[level];
            document.documentElement.style.setProperty('--theme-color', theme.hex);
            document.documentElement.style.setProperty('--theme-rgb', theme.rgb);
            document.documentElement.style.setProperty('--theme-text', theme.text);
            document.getElementById('levelBadge').innerText = theme.name;

            container.innerHTML = '';
            let rawRecs = [];

            if (docType === "節慶") {
                rawRecs = ALL_FESTIVALS;
            } else if (docType === "招生檔期") {
                rawRecs = ALL_RECRUITS[level] || [];
            } else if (docType === "常態課程") {
                rawRecs = NORMAL_COURSES[level] || [];
            }

            let validRecs = [];
            if (Array.isArray(rawRecs)) {
                for (let i = 0; i < rawRecs.length; i++) {
                    let item = rawRecs[i];
                    if (item && typeof item === 'string' && item.trim() !== "") {
                        validRecs.push(item.trim());
                    }
                }
            }

            if (validRecs.length === 0) validRecs = ["本區塊暫無資料"];
            
            validRecs.forEach(item => {
                const btn = document.createElement('button');
                btn.className = "bg-white border border-slate-200 text-slate-600 text-[13px] px-4 py-1.5 rounded-full shadow-sm hover-theme transition-all duration-300 font-bold tracking-wide";
                btn.innerText = item;
                btn.onclick = () => {
                    if(item === "本區塊暫無資料") return; 
                    document.getElementById('topic').value = item;
                    document.getElementById('notes').value = ""; 
                    checkHiddenCourseData(item);
                };
                container.appendChild(btn);
            });
        }

        function checkHiddenCourseData(topicInput) {
            const msg = document.getElementById('hiddenDataMsg');
            let found = false;
            for(let key in COURSE_DB) {
                if(topicInput.includes(key)) found = true;
            }
            if(found) {
                msg.classList.remove('hidden');
            } else {
                msg.classList.add('hidden');
            }
        }

        function copyCurrentOutput() {
            navigator.clipboard.writeText(document.getElementById('outputArea').value).then(() => {
                alert('✨ 文案已成功複製，快去發布吧！');
            });
        }

        function fixTitleFormat(text) {
            let lines = text.split('\n');
            let firstLineIdx = 0;
            while(firstLineIdx < lines.length && lines[firstLineIdx].trim() === '') {
                firstLineIdx++;
            }
            if (firstLineIdx < lines.length) {
                let firstLine = lines[firstLineIdx].trim();
                firstLine = firstLine.replace(/^標題[：:]\s*/, '');
                firstLine = firstLine.replace(/^\*\*標題[：:]\*\*\s*/, '');
                firstLine = firstLine.replace(/^【標題】\s*/, '');
                
                if (!firstLine.includes('◤') && !firstLine.includes('◢')) {
                    lines[firstLineIdx] = `◤ ${firstLine} ◢`;
                } else if (!firstLine.includes('◤')) {
                    lines[firstLineIdx] = `◤ ${firstLine}`;
                } else if (!firstLine.includes('◢')) {
                    lines[firstLineIdx] = `${firstLine} ◢`;
                } else {
                    lines[firstLineIdx] = firstLine;
                }
                return lines.join('\n');
            }
            return text;
        }

        async function processGeneration() {
            // 🚨 全域錯誤捕捉器
            try {
                const branch = document.getElementById('branchSelect').value;
                const branchInfo = BRANCH_DATA[branch];
                const type = document.getElementById('docType').value;
                const topicEl = document.getElementById('topic');
                const topic = topicEl.value.trim();
                const notes = document.getElementById('notes').value.trim();
                
                const branchStyle = BRANCH_STYLE_DB[branch] || "熱血、溫暖、專業的逗點標準語氣";

                // 🚨 視覺化防呆：如果沒填主題，框框會閃爍紅燈
                if(!topic) {
                    topicEl.classList.add('border-red-500', 'ring-2', 'ring-red-200');
                    setTimeout(() => topicEl.classList.remove('border-red-500', 'ring-2', 'ring-red-200'), 2000);
                    topicEl.focus();
                    alert("⚠️ 逗點大腦提醒您：請先點擊靈感角落，或手動輸入「文案主題」喔！");
                    return;
                }

                let hiddenCoursePrompt = "";
                let isCourseInjected = false;
                for(let key in COURSE_DB) {
                    if(topic.includes(key) || notes.includes(key)) {
                        hiddenCoursePrompt += `\n【隱藏版系統指示：${key} 專屬課程價值】\n`;
                        hiddenCoursePrompt += `- 課程特色：${COURSE_DB[key].features}\n`;
                        hiddenCoursePrompt += `- 家長痛點：${COURSE_DB[key].pain}\n`;
                        hiddenCoursePrompt += `- 關鍵成果：${COURSE_DB[key].results}\n`;
                        isCourseInjected = true;
                    }
                }
                
                const msg = document.getElementById('hiddenDataMsg');
                if (isCourseInjected) {
                    msg.classList.remove('hidden');
                }

                const finalPrompt = `角色設定：
你是「COMMA 逗點教室」的資深社群總監。請完全吸收以下的品牌大腦與分校風格，撰寫 Facebook 貼文。

【逗點品牌大腦與核心靈魂】
1. 品牌定位：不是成績加工廠，而是「教育基地」。使命是「接住每一個孩子」。
2. 核心價值：陪伴大於成績、全人發展與境教、善的循環。

【✨ 該分校專屬風格設定 ✨】
- 請務必採用以下語氣與風格撰寫：『 ${branchStyle} 』
- 稱呼：請用「逗點」、「教育基地」或「大人朋友」。稱呼家長為「逗爸逗媽」。
- 格式：段落必定留白。適度使用符合該分校氛圍的溫暖 Emoji。

【FB 專屬爆款貼文骨架 (正文精準控制在 150-200 字之間)】
1. 破題金句 (Hook)：文章的「第一行」必須是一句戳中痛點的吸睛標題。且最前面與最後面，必須直接使用 ◤ 與 ◢ 包住。絕對不能出現「標題：」字眼。
2. 痛點同理與解法：自然帶入「陪伴」理念與專屬風格。
3. 溫暖呼籲 (CTA)：自然引導行動，附 3-5 個 Hashtag。

【本次任務需求】
發布分校：${LEVEL_NAMES[branchInfo.level]} (${branch})
文案類型：${type}
文案主題：${topic}

【在地真實細節素材】
${notes ? notes : "無提供細節，請依據品牌精神與分校風格自由發揮"}
${hiddenCoursePrompt}

🚨 核心寫作指令（極度重要）：
請你務必將上方提供的「在地真實細節素材」作為靈感，運用【✨ 分校專屬風格設定 ✨】進行「重新擴寫與潤飾」，把它變成一段生動、有畫面的情境故事！絕對禁止原封不動地照抄素材句子！

【輸出格式最終限制】
1. 直接輸出純文字貼文，不加開場廢話，禁用 JSON 區塊。
2. 結尾請直接接上以下的「固定結尾資訊」（不要加外框或任何引言）：

⸻⸻⸻⸻⸻⸻
「逗點，是一個創新的起點。」
 逗點官網｜https://www.comma.study
 ${branch} IG｜${branchInfo.ig}
 ${branch} 專線｜${branchInfo.phone}
 ${branch} 地址｜${branchInfo.address}
`;

                if (!isApiMode) {
                    document.getElementById('outputArea').value = `【請複製以下內容貼給 ChatGPT】\n\n------------------------\n\n${finalPrompt}`;
                } else {
                    const apiKey = document.getElementById('apiKey').value.trim();
                    if(!apiKey) return alert('⚠️ 請先在右上角輸入您的 Groq API Key！');
                    
                    document.getElementById('loadingUI').classList.remove('hidden');
                    document.getElementById('outputArea').value = ""; 
                    
                    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                        body: JSON.stringify({
                            model: 'llama-3.3-70b-versatile',
                            messages: [{ role: 'user', content: finalPrompt }],
                            temperature: 0.8
                        })
                    });
                    
                    const data = await res.json();
                    
                    // 🚨 API 錯誤偵測
                    if (!res.ok) {
                        throw new Error(data.error?.message || "無法連線至 AI 伺服器，請檢查您的 API Key 或網路連線。");
                    }

                    let aiResult = data.choices[0].message.content.trim();
                    aiResult = fixTitleFormat(aiResult);
                    document.getElementById('outputArea').value = aiResult;
                }
            } catch (err) {
                // 🚨 如果發生任何當機，會清楚印出在這裡
                console.error(err);
                document.getElementById('outputArea').value = `系統發生錯誤：\n${err.message}\n\n請檢查 API Key 是否正確，或聯絡技術人員。`;
                alert("系統發生未預期錯誤：" + err.message);
            } finally {
                document.getElementById('loadingUI').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
