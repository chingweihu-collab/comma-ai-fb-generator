        function updateDynamicInspirations() {
            const branch = document.getElementById('branchSelect').value;
            const level = BRANCH_DATA[branch] ? BRANCH_DATA[branch].level : "ele"; 
            const docType = document.getElementById('docType').value;
            const container = document.getElementById('inspirationBox');
            
            const rhythm = MONTHLY_CALENDAR[currentMonth] || { fest: [], recruit: { ele: [], jun: [], sen: [] } };

            container.innerHTML = '';
            let rawRecs = [];

            if (docType === "節慶") {
                rawRecs = rhythm.fest || [];
            } else if (docType === "招生檔期") {
                if (rhythm.recruit && rhythm.recruit[level]) {
                    rawRecs = rhythm.recruit[level];
                }
            } else if (docType === "常態課程") {
                rawRecs = NORMAL_COURSES[level] || [];
            }

            // 🚀 終極過濾器：拔除任何長得像 undefined 的東西
            let validRecs = [];
            if (Array.isArray(rawRecs)) {
                for (let i = 0; i < rawRecs.length; i++) {
                    let item = rawRecs[i];
                    if (item && typeof item === 'string') {
                        let cleanItem = item.trim();
                        if (cleanItem !== "" && cleanItem.toLowerCase() !== "undefined" && cleanItem.toLowerCase() !== "null") {
                            validRecs.push(cleanItem);
                        }
                    }
                }
            }

            if (validRecs.length === 0) {
                validRecs = ["本月暫無重點排程"];
            }
            
            validRecs.forEach(item => {
                const btn = document.createElement('button');
                // 🚀 UI 優化：滑鼠移過變黃底黑字
                btn.className = "bg-white border border-gray-300 text-gray-700 text-xs px-3 py-1.5 rounded shadow-sm hover:bg-[#ffd600] hover:border-[#ffd600] hover:text-[#2d3b48] transition-all font-bold";
                btn.innerText = item;
                btn.onclick = () => {
                    if(item === "本月暫無重點排程") return; 
                    document.getElementById('topic').value = item;
                    document.getElementById('notes').value = ""; 
                    checkHiddenCourseData(item);
                };
                container.appendChild(btn);
            });
        }

        function checkHiddenCourseData(topicInput) {
            const msg = document.getElementById('hiddenDataMsg');
            let found = false;
            for(let key in COURSE_DB) {
                if(topicInput.includes(key)) found = true;
            }
            if(found) {
                msg.classList.remove('hidden');
            } else {
                msg.classList.add('hidden');
            }
        }

        // 🚀 標題強制矯正器 (Post-Processor)
        function fixTitleFormat(text) {
            let lines = text.split('\n');
            if (lines.length > 0) {
                let firstLine = lines[0].trim();
                // 拔掉 AI 自作聰明的「標題：」
                firstLine = firstLine.replace(/^標題[：:]\s*/, '');
                firstLine = firstLine.replace(/^\*\*標題[：:]\*\*\s*/, '');
                
                // 強制加上 ◤ ◢
                if (!firstLine.includes('◤') && !firstLine.includes('◢')) {
                    lines[0] = `◤ ${firstLine} ◢`;
                } else if (!firstLine.includes('◤')) {
                    lines[0] = `◤ ${firstLine}`;
                } else if (!firstLine.includes('◢')) {
                    lines[0] = `${firstLine} ◢`;
                } else {
                    lines[0] = firstLine; // 都有就維持原樣
                }
                return lines.join('\n');
            }
            return text;
        }

            const finalPrompt = `角色設定：
你是「COMMA 逗點教室」的資深社群總監。請完全吸收以下的品牌大腦，撰寫可以直接發布的 Facebook 貼文。

【逗點品牌大腦與核心靈魂】
1. 品牌定位：不是成績加工廠，而是「教育基地」。使命是「接住每一個孩子」。
2. 核心價值：陪伴大於成績、全人發展與境教、善的循環。

【寫作風格與禁忌】

                        })

                    const data = await res.json();
                    let aiResult = data.choices[0].message.content.trim();
